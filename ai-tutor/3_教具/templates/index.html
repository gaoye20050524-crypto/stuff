<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 小助手 - 知识问答</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span class="header-emoji">🤖</span>
            <h1>AI 小助手</h1>
            <div class="subtitle">和 AI 一起探索奇妙的知识世界吧！</div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome-message">
                <div class="welcome-icon">👋</div>
                <h2>你好呀！欢迎来到 AI 小课堂！</h2>
                <p>我是你的 AI 知识问答助手，<br>你可以问我关于人工智能的各种问题哦！<br>试试下面的快速问题，或者自己输入问题吧！</p>
            </div>
        </div>

        <div class="quick-questions">
            <button class="quick-btn" data-question="什么是人工智能？">🤔 什么是AI</button>
            <button class="quick-btn" data-question="AI是怎么看东西的？">👁️ AI怎么看东西</button>
            <button class="quick-btn" data-question="AI会思考吗？">🧠 AI会思考吗</button>
            <button class="quick-btn" data-question="AI有什么用？">✨ AI有什么用</button>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你想问的问题..." maxlength="200">
            <button class="send-btn" id="sendBtn" aria-label="发送">➤</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
